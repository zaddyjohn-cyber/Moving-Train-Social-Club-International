<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" style="position:relative;z-index:2;display:block;width:100%;height:auto;">
<defs>
  <radialGradient id="bgGrad" cx="42%" cy="38%" r="72%">
    <stop offset="0%" stop-color="#1A3C70"/><stop offset="55%" stop-color="#091840"/><stop offset="100%" stop-color="#030A18"/>
  </radialGradient>
  <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#F6DC6A"/><stop offset="28%" stop-color="#C4922A"/>
    <stop offset="52%" stop-color="#F0D060"/><stop offset="78%" stop-color="#9A7018"/><stop offset="100%" stop-color="#E8C050"/>
  </linearGradient>
  <linearGradient id="topOvl" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#020810" stop-opacity="0.94"/>
    <stop offset="52%" stop-color="#020810" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="botOvl" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="48%" stop-color="#020810" stop-opacity="0"/>
    <stop offset="100%" stop-color="#020810" stop-opacity="0.94"/>
  </linearGradient>
  <radialGradient id="vigGrad" cx="50%" cy="50%" r="50%">
    <stop offset="55%" stop-color="transparent"/>
    <stop offset="100%" stop-color="#020810" stop-opacity="0.65"/>
  </radialGradient>
  <clipPath id="badgeClip"><circle cx="200" cy="200" r="173"/></clipPath>
  <path id="topArc" d="M 45,200 A 155,155 0 0,1 355,200"/>
  <path id="botArc" d="M 45,200 A 155,155 0 0,0 355,200"/>
  <style>
    @keyframes shimmer    { 0%,100%{opacity:1;} 50%{opacity:.88;} }
    @keyframes sparkle    { 0%,100%{opacity:1;transform:scale(1) rotate(0deg);} 50%{opacity:.35;transform:scale(.65) rotate(22.5deg);} }
    .gold-ring{animation:shimmer 3s ease-in-out infinite;}
    .sp-l{transform-box:fill-box;transform-origin:center;animation:sparkle 2.6s ease-in-out infinite 0s;}
    .sp-r{transform-box:fill-box;transform-origin:center;animation:sparkle 2.6s ease-in-out infinite 1.3s;}
    .sp-tl{transform-box:fill-box;transform-origin:center;animation:sparkle 3.2s ease-in-out infinite .6s;}
    .sp-tr{transform-box:fill-box;transform-origin:center;animation:sparkle 3.2s ease-in-out infinite 1.9s;}
    .sp-bl{transform-box:fill-box;transform-origin:center;animation:sparkle 3.2s ease-in-out infinite 1.1s;}
    .sp-br{transform-box:fill-box;transform-origin:center;animation:sparkle 3.2s ease-in-out infinite 2.4s;}
  </style>
</defs>

<!-- OUTER RINGS -->
<circle cx="200" cy="200" r="196" fill="url(#goldGrad)" class="gold-ring"/>
<circle cx="200" cy="200" r="192" fill="#040C1E"/>
<circle cx="200" cy="200" r="188" fill="#070F26"/>
<circle cx="200" cy="200" r="183" fill="none" stroke="url(#goldGrad)" stroke-width="2.5"/>
<circle cx="200" cy="200" r="180" fill="#060E22"/>
<circle cx="200" cy="200" r="176" fill="none" stroke="#C4922A" stroke-width="1.2"/>

<!-- BADGE INTERIOR -->
<g clip-path="url(#badgeClip)">
  

  <!-- VIDEO fills full badge circle -->
  

  <circle cx="200" cy="200" r="173" fill="url(#bgGrad)"/>
  
  <!-- VIDEO in foreignObject -->
  <foreignObject x="27" y="27" width="346" height="346" clip-path="url(#badgeClip)">
    <div xmlns="http://www.w3.org/1999/xhtml" style="width:100%;height:100%;overflow:hidden;">
      <video autoplay muted loop playsinline
        style="width:100%;height:100%;object-fit:cover;object-position:center 60%;display:block;">
        
      </video>
    </div>
  </foreignObject>
  <!-- Inner gold rim -->
  <circle cx="200" cy="200" r="173" fill="none" stroke="rgba(196,146,42,0.4)" stroke-width="1"/>
</g>

<!-- SPARKLES -->
<g class="sp-l" transform="translate(12,200)"><line x1="-12" y1="0" x2="12" y2="0" stroke="#F4D060" stroke-width="2.4"/><line x1="0" y1="-12" x2="0" y2="12" stroke="#F4D060" stroke-width="2.4"/><line x1="-8" y1="-8" x2="8" y2="8" stroke="#F4D060" stroke-width="1.3"/><line x1="8" y1="-8" x2="-8" y2="8" stroke="#F4D060" stroke-width="1.3"/><circle r="3" fill="#F4D060"/></g>
<g class="sp-r" transform="translate(388,200)"><line x1="-12" y1="0" x2="12" y2="0" stroke="#F4D060" stroke-width="2.4"/><line x1="0" y1="-12" x2="0" y2="12" stroke="#F4D060" stroke-width="2.4"/><line x1="-8" y1="-8" x2="8" y2="8" stroke="#F4D060" stroke-width="1.3"/><line x1="8" y1="-8" x2="-8" y2="8" stroke="#F4D060" stroke-width="1.3"/><circle r="3" fill="#F4D060"/></g>
<g class="sp-tl" transform="translate(63,63)"><line x1="-7" y1="0" x2="7" y2="0" stroke="#C4922A" stroke-width="1.7"/><line x1="0" y1="-7" x2="0" y2="7" stroke="#C4922A" stroke-width="1.7"/><line x1="-5" y1="-5" x2="5" y2="5" stroke="#C4922A" stroke-width="1"/><line x1="5" y1="-5" x2="-5" y2="5" stroke="#C4922A" stroke-width="1"/><circle r="2.2" fill="#E8C058"/></g>
<g class="sp-tr" transform="translate(337,63)"><line x1="-7" y1="0" x2="7" y2="0" stroke="#C4922A" stroke-width="1.7"/><line x1="0" y1="-7" x2="0" y2="7" stroke="#C4922A" stroke-width="1.7"/><line x1="-5" y1="-5" x2="5" y2="5" stroke="#C4922A" stroke-width="1"/><line x1="5" y1="-5" x2="-5" y2="5" stroke="#C4922A" stroke-width="1"/><circle r="2.2" fill="#E8C058"/></g>
<g class="sp-bl" transform="translate(63,337)"><line x1="-7" y1="0" x2="7" y2="0" stroke="#C4922A" stroke-width="1.7"/><line x1="0" y1="-7" x2="0" y2="7" stroke="#C4922A" stroke-width="1.7"/><line x1="-5" y1="-5" x2="5" y2="5" stroke="#C4922A" stroke-width="1"/><line x1="5" y1="-5" x2="-5" y2="5" stroke="#C4922A" stroke-width="1"/><circle r="2.2" fill="#E8C058"/></g>
<g class="sp-br" transform="translate(337,337)"><line x1="-7" y1="0" x2="7" y2="0" stroke="#C4922A" stroke-width="1.7"/><line x1="0" y1="-7" x2="0" y2="7" stroke="#C4922A" stroke-width="1.7"/><line x1="-5" y1="-5" x2="5" y2="5" stroke="#C4922A" stroke-width="1"/><line x1="5" y1="-5" x2="-5" y2="5" stroke="#C4922A" stroke-width="1"/><circle r="2.2" fill="#E8C058"/></g>

</svg>